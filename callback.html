<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conectando...</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0d0f12; color: #e8eaf0; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
p { font-size: 15px; color: #6b7280; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Conectando ao Kommo...</p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');

if (error) {
  document.querySelector('p').textContent = 'Autorização negada. Fechando...';
  setTimeout(() => window.close(), 2000);
} else if (code) {
  // Salva o code no localStorage para o dashboard principal ler
  localStorage.setItem('kmm_oauth_code', code);
  localStorage.setItem('kmm_oauth_ts', Date.now().toString());

  // Se abriu como popup, fecha e o pai captura
  if (window.opener) {
    window.opener.postMessage({ type: 'kmm_oauth', code }, '*');
    window.close();
  } else {
    // Se abriu na mesma aba, redireciona para o index com o code
    window.location.href = '/?code=' + encodeURIComponent(code);
  }
} else {
  document.querySelector('p').textContent = 'Nenhum código recebido. Tente novamente.';
  setTimeout(() => window.close(), 3000);
}
</script>
</body>
</html>
